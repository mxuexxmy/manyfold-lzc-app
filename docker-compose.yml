services:
  manyfold:
    image: xxmymxue/manyfold:0.103.2
    ports:
      - 3214:3214
    volumes:
      - ./models:/models
    environment:
      PUID: 1000
      PGID: 1000
      SECRET_KEY_BASE: lazycatcloud.cloudcatlazy
      REDIS_URL: redis://redis:6379/1
      DATABASE_ADAPTER: postgresql
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: manyfold
      DATABASE_PASSWORD: password
      DATABASE_NAME: manyfold
      REGISTRATION: enabled
      MULTIUSER: enabled
    depends_on:
      - postgres
      - redis
    networks:
      - manyfold
    links:
      - postgres
      - redis

  postgres:
    image: postgres:15
    volumes:
      - ./db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: manyfold
      POSTGRES_PASSWORD: password
    networks:
      - manyfold

  redis:
    image: redis:7
    networks:
      - manyfold

networks:
  manyfold:
